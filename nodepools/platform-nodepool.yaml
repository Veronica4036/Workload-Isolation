apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: platform
spec:
  template:
    metadata:
      labels:
        workload-type: platform
    spec:
      taints:
        - key: workload-type
          value: platform
          effect: NoSchedule
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - m6i.large
            - m6i.xlarge
            - m7i.large
            - m7i.xlarge
            - c6i.large
            - c6i.xlarge
            - c7i.large
            - c7i.xlarge
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 60s
    budgets:
      - nodes: "20%"
  limits:
    cpu: "64"
    memory: 128Gi
